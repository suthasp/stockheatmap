<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Heatmap — หุ้นไทย SET</title>
<style>
  :root{
    --bg:#131722; --panel:#1e222d; --border:#2a2e39;
    --text:#d1d4dc; --muted:#787b86; --accent:#2962ff;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Segoe UI',-apple-system,Roboto,'Helvetica Neue',sans-serif;
    display:flex; flex-direction:column;
  }
  header{
    display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--border);
  }
  header h1{font-size:16px; font-weight:600}
  header h1 .dot{color:#26a69a}
  .controls{display:flex; gap:10px; margin-left:auto; flex-wrap:wrap; align-items:center}
  select{
    background:var(--bg); color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:6px 10px; font-size:13px; cursor:pointer; outline:none;
  }
  select:hover{border-color:var(--accent)}
  label{font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px}
  #heatmapControls{display:flex; gap:10px;}
  #widget{flex:1; min-height:0}
  footer{
    padding:6px 16px; background:var(--panel); border-top:1px solid var(--border);
    font-size:11px; color:var(--muted); display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  #clock{font-variant-numeric:tabular-nums}
</style>
</head>
<body>

<header>
  <h1><span class="dot">●</span> Stock Heatmap</h1>
  <div class="controls">
    <label>ตลาด
      <select id="dataSource">
        <option value="SET" selected>SET (ไทย)</option>
        <option value="SPX500">S&amp;P 500 (สหรัฐ)</option>
        <option value="NASDAQ100">NASDAQ 100 (สหรัฐ)</option>
        <option value="DJ30">Dow Jones 30 (สหรัฐ)</option>
      </select>
    </label>
    <div id="heatmapControls">
      <label>จัดกลุ่ม
        <select id="grouping">
          <option value="sector" selected>ตามกลุ่มอุตสาหกรรม</option>
          <option value="no_group">ไม่จัดกลุ่ม</option>
        </select>
      </label>
      <label>สีตาม
        <select id="blockColor">
          <option value="change" selected>% เปลี่ยนแปลงวันนี้</option>
          <option value="Perf.W">% สัปดาห์</option>
          <option value="Perf.1M">% เดือน</option>
          <option value="Perf.YTD">% YTD</option>
        </select>
      </label>
    </div>
  </div>
</header>

<div id="widget"></div>

<footer>
  <span>ข้อมูลโดย TradingView — ราคาอัปเดตอัตโนมัติ (อาจดีเลย์ตามข้อกำหนดของแต่ละตลาด)</span>
  <span id="clock"></span>
</footer>

<script>
  const container = document.getElementById('widget');
  const heatmapControls = document.getElementById('heatmapControls');

  function loadWidget() {
    const source = document.getElementById('dataSource').value;
    const isThai = source === 'SET';

    heatmapControls.style.display = isThai ? 'none' : 'flex';

    container.innerHTML = '<div class="tradingview-widget-container" style="height:100%;width:100%"><div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div></div>';

    const s = document.createElement('script');
    s.async = true;

    if (isThai) {
      container.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                    height:100%;gap:20px;text-align:center;padding:40px;">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#787b86" stroke-width="1.5">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
            <path d="M7 8h10M7 11h6" stroke-linecap="round"/>
          </svg>
          <div>
            <h2 style="color:#d1d4dc;font-size:18px;margin-bottom:8px;">หุ้นไทย (SET) ไม่รองรับการ embed</h2>
            <p style="color:#787b86;max-width:380px;line-height:1.7;font-size:13px;">
              TradingView จำกัดข้อมูล SET ไว้เฉพาะบนแพลตฟอร์มของตนเอง<br>
              ไม่สามารถ embed ผ่าน widget ได้
            </p>
          </div>
          <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
            <a href="https://www.tradingview.com/screener/?country=TH" target="_blank" rel="noopener"
               style="background:#2962ff;color:#fff;padding:10px 20px;border-radius:6px;
                      text-decoration:none;font-size:13px;font-weight:600;">
              Screener หุ้นไทย →
            </a>
            <a href="https://www.tradingview.com/symbols/SET-SETI/" target="_blank" rel="noopener"
               style="background:#1e222d;color:#d1d4dc;padding:10px 20px;border-radius:6px;
                      text-decoration:none;font-size:13px;font-weight:600;border:1px solid #2a2e39;">
              ดัชนี SET Index →
            </a>
          </div>
          <p style="color:#4a4f5a;font-size:11px;">เปิดในแท็บใหม่บน TradingView.com</p>
        </div>`;
      return;
    } else {
      s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js';
      s.innerHTML = JSON.stringify({
        dataSource: source,
        grouping: document.getElementById('grouping').value,
        blockSize: 'market_cap_basic',
        blockColor: document.getElementById('blockColor').value,
        locale: 'th_TH',
        colorTheme: 'dark',
        symbolUrl: '',
        hasTopBar: true,
        isDataSetEnabled: true,
        isZoomEnabled: true,
        hasSymbolTooltip: true,
        isMonoSize: false,
        width: '100%',
        height: '100%'
      });
    }

    container.firstChild.appendChild(s);
  }

  ['dataSource', 'grouping', 'blockColor'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const saved = localStorage.getItem('hm_' + id);
    if (saved && [...el.options].some(o => o.value === saved)) el.value = saved;
    el.addEventListener('change', () => {
      localStorage.setItem('hm_' + id, el.value);
      loadWidget();
    });
  });

  loadWidget();

  setInterval(() => {
    document.getElementById('clock').textContent =
      new Date().toLocaleString('th-TH', {timeZone: 'Asia/Bangkok', dateStyle: 'medium', timeStyle: 'medium'});
  }, 1000);
</script>

</body>
</html>
